<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Membership Registration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f0f8ff;
}

header{
    background:#00695c;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:30px auto;
    display:flex;
    gap:30px;
    flex-wrap:wrap;
}

.about{
    flex:1;
    min-width:300px;
}

.about h2{
    color:#00695c;
    margin-bottom:15px;
}

.about p{
    line-height:1.8;
}

.form-box{
    flex:1;
    min-width:300px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,.2);
}

.form-box h2{
    text-align:center;
    margin-bottom:20px;
}

.form-box label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.form-box input,
.form-box select,
.form-box textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

.form-box button{
    width:100%;
    padding:12px;
    background:#00695c;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.form-box button:hover{
    background:#004d40;
}

footer{
    background:#00695c;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}
</style>

</head>
<body>

<header>
    <h1>Membership Registration</h1>
    <p>Become a member of our community.</p>
</header>

<div class="container">

    <section class="about">
        <h2>About Us</h2>
        <p>
            We are committed to building a strong, united, and supportive
            community. Register today to enjoy the benefits of membership.
        </p>
    </section>

    <section class="form-box">
        <h2>Registration Form</h2>

        <form>
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" placeholder="Enter your full name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter your phone number" required>

            <label for="gender">Gender</label>
            <select id="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <label for="address">Address</label>
            <textarea id="address" rows="4" placeholder="Enter your address"></textarea>

            <button type="submit">Register</button>
        </form>

    </section>

</div>

<footer>
    <p>&copy; 2026 Membership Registration</p>
</footer>

</body>
</html>
