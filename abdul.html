<!DOCTYPE html>
<html>
<head>
    <title>Football Management System</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            margin:20px;
        }

        h1{
            text-align:center;
            color:green;
        }

        .box{
            background:white;
            padding:20px;
            width:500px;
            margin:auto;
            border:1px solid #ccc;
        }

        input{
            width:100%;
            padding:8px;
            margin:8px 0;
        }

        button{
            background:green;
            color:white;
            padding:10px;
            border:none;
            width:100%;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        table, th, td{
            border:1px solid black;
        }

        th, td{
            padding:8px;
            text-align:center;
        }

        th{
            background:green;
            color:white;
        }
    </style>

</head>

<body>

<h1>Football Management System</h1>

<div class="box">

    <h3>Player Registration</h3>

    <input type="text" placeholder="Player Name">

    <input type="text" placeholder="Team Name">

    <input type="text" placeholder="Position">

    <button>Register</button>

    <h3>Players List</h3>

    <table>
        <tr>
            <th>Name</th>
            <th>Team</th>
            <th>Position</th>
        </tr>

        <tr>
            <td>John</td>
            <td>Lions FC</td>
            <td>Forward</td>
        </tr>

        <tr>
            <td>David</td>
            <td>Tigers FC</td>
            <td>Goalkeeper</td>
        </tr>
    </table>

</div>

</body>
</html>
