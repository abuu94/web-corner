<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Fruits Shop</title>


<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:linear-gradient(to right, orange, green);
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    font-size:40px;
}

header p{
    margin-top:10px;
}

.container{
    width:90%;
    margin:auto;
    padding:30px 0;
}

.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    background:white;
    width:250px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-body{
    padding:15px;
    text-align:center;
}

.card-body h3{
    color:#333;
    margin-bottom:10px;
}

.price{
    color:green;
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

.btn{
    background:orange;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.btn:hover{
    background:darkorange;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}
</style>

</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Fresh Fruits Shop</title>

    

</body>
</html>



<header>
    <h1> Fresh Fruits Shop</h1>
    <p>Karibu kununua matunda safi kwa bei nafuu</p>
</header>

<div class="container">
    <div class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce" alt="Apple">
            <div class="card-body">
                <h3>Apple</h3>
                <p class="price">TZS 2,000</p>
                <button class="btn">Buy</button>
            </div>
        </div>

        

        <div class="card">
            <img src="https://images.unsplash.com/photo-1550258987-190a2d41a8ba" alt="Pineapple">
            <div class="card-body">
                <h3>Pineapple</h3>
                <p class="price">TZS 1,800</p>
                <button class="btn">Buy</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1528825871115-3581a5387919" alt="Banana">
            <div class="card-body">
                <h3>Banana</h3>
                <p class="price">TZS 2,500</p>
                <button class="btn">Buy</button>
            </div>
        </div>

    </div>
</div>

<footer>
    <p>&copy; 2026 Fresh Fruits Shop | Matunda Bora Kila Siku</p>
</footer>

</body>
</html>
